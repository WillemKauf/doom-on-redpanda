<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Doom on Redpanda</title>
<style>
  html, body { margin: 0; padding: 0; background: #111; color: #ddd;
               font-family: monospace; height: 100%; }
  body { display: flex; flex-direction: column; align-items: center;
         justify-content: center; }
  h1 { font-size: 14px; margin: 8px 0 4px 0; font-weight: normal;
       color: #888; letter-spacing: 0.2em; }
  #controls { font-size: 12px; color: #888; margin: 6px 0; display: flex;
              gap: 16px; align-items: center; }
  #controls label { display: flex; align-items: center; gap: 6px; }
  #controls input[type=range] { width: 160px; }
  #controls input[type=number] { width: 60px; background: #222; color: #ddd;
                                 border: 1px solid #444; padding: 2px 4px; }
  #canvas { image-rendering: pixelated; image-rendering: crisp-edges;
            border: 1px solid #333; width: 960px; height: 600px; }
  #status { font-size: 12px; color: #666; margin-top: 8px; }
  .keys { font-size: 11px; color: #555; margin-top: 4px; }
  .keys b { color: #888; }
</style>
</head>
<body>
<h1>D &nbsp; O &nbsp; O &nbsp; M &nbsp; &nbsp; O N &nbsp; &nbsp; R E D P A N D A</h1>
<canvas id="canvas" width="320" height="200"></canvas>
<div id="controls">
  <label>target FPS
    <input id="rate" type="range" min="1" max="200" value="35" step="1">
    <input id="rate-num" type="number" min="1" max="1000" value="35">
  </label>
  <label><input id="uncapped" type="checkbox"> uncapped</label>
</div>
<div id="status">connecting&hellip;</div>
<div class="keys">
  <b>arrows</b> move &nbsp;
  <b>ctrl</b> fire &nbsp;
  <b>space</b> use &nbsp;
  <b>alt</b> strafe &nbsp;
  <b>shift</b> run &nbsp;
  <b>enter</b> menu &nbsp;
  <b>esc</b> back &nbsp;
  <b>1-7</b> weapons &nbsp;
  <b>y/n</b> yes/no
</div>
<script src="doom.js"></script>
</body>
</html>
